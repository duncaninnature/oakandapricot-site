<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oak & Apricot</title>

  <style>
    :root {
      --oak: #1f3f2a;
      --cream: #f4efe6;
      --text: #2f4636;
    }

    body {
      margin: 0;
      background: var(--cream);
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      padding: 1.5rem;
      max-width: 700px;
      width: 100%;
    }

    .logo {
      max-width: 600px;
      width: 100%;
      height: auto;
      margin-bottom: 1.5rem;
    }

    .tagline {
      margin: 0 0 2rem;
      font-size: 1.05rem;
      color: var(--text);
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
    }

    .button {
      background: var(--oak);
      color: white;
      text-decoration: none;
      padding: 0.9rem 1.4rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      min-width: 260px;
    }

    .button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div class="container">

    <img src="images/OandA_SL_Horiz.png" alt="Oak & Apricot" class="logo">

    <p class="tagline">
      Public-interest tree research for residents in the Santa Clara Valley
    </p>

    <div class="buttons">
      <a href="/sjtrees/" class="button">
        San José Street Tree Project
      </a>

      <!-- future buttons -->
      <!-- <a href="/another/" class="button">Another Resource</a> -->
    </div>

  </div>
</body>
</html>
